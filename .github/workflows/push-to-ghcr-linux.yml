name: Push Docker Images (Linux) to GHCR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/push-to-ghcr-linux.yml'
      - 'images-config.linux.json'
  
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Configuration file path (default: images-config.linux.json)'
        required: false
        type: string
        default: 'images-config.linux.json'

env:
  REGISTRY: ghcr.io

jobs:
  push-to-ghcr:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load and validate config
        id: config
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file || 'images-config.linux.json' }}"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::Config file not found: $CONFIG_FILE"
            exit 1
          fi
          
          # Validte JSON format
          jq empty "$CONFIG_FILE"
          
          IMAGE_COUNT=$(jq '[.[] | select(.source_image != null and .source_image != "")] | length' "$CONFIG_FILE")
          echo "image_count=$IMAGE_COUNT" >> $GITHUB_OUTPUT
          
          # if there are valid images, set the matrix output
          if [ "$IMAGE_COUNT" -gt 0 ]; then
            MATRIX=$(jq -c 'map({source_image, repository_name, tag})' "$CONFIG_FILE")
            echo "matrix=$(echo $MATRIX | jq -c .)" >> $GITHUB_OUTPUT
            echo "has_images=true" >> $GITHUB_OUTPUT
          else
            echo "has_images=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Process images
        if: steps.config.outputs.has_images == 'true'
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file || 'images-config.linux.json' }}"
          TRIVY_REPORT="/tmp/trivy-report.txt"
          : > "$TRIVY_REPORT"
          
          jq -c '.[]' "$CONFIG_FILE" | while read -r line; do
            SOURCE_IMAGE=$(echo "$line" | jq -r '.source_image')
            REPOSITORY_NAME=$(echo "$line" | jq -r '.repository_name')
            TAG=$(echo "$line" | jq -r '.tag // "latest"')
            TARGET_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${REPOSITORY_NAME}"
            
            echo ""
            echo "════════════════════════════════════════"
            echo "📦 Processing: $SOURCE_IMAGE"
            echo "════════════════════════════════════════"
            
            echo "📥 Pulling source image..."
            docker pull "$SOURCE_IMAGE" --quiet
            
            echo "🔍 Scanning for vulnerabilities with Trivy..."
            echo "### $SOURCE_IMAGE" >> "$TRIVY_REPORT"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image --severity HIGH,CRITICAL \
              --format table "$SOURCE_IMAGE" >> "$TRIVY_REPORT" 2>&1 || true
            echo "" >> "$TRIVY_REPORT"
            
            echo "🏷️  Tagging image..."
            docker tag "$SOURCE_IMAGE" "${TARGET_IMAGE}:${TAG}"
            docker tag "$SOURCE_IMAGE" "${TARGET_IMAGE}:latest"
            
            echo "🚀 Pushing to GHCR..."
            docker push "${TARGET_IMAGE}:${TAG}"
            docker push "${TARGET_IMAGE}:latest"
            
            echo "🧹 Cleaning up..."
            docker rmi "$SOURCE_IMAGE" "${TARGET_IMAGE}:${TAG}" "${TARGET_IMAGE}:latest" || true
            
            echo "✅ Done: $SOURCE_IMAGE → ${TARGET_IMAGE}:${TAG}"
          done
          
          # Guardar documento de reporte para el summary
          cp "$TRIVY_REPORT" /tmp/trivy-summary.txt

      - name: Create job summary
        if: always()
        shell: bash
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file || 'images-config.linux.json' }}"
          TRIVY_REPORT="/tmp/trivy-summary.txt"
          IMAGE_COUNT=${{ steps.config.outputs.image_count }}
          
          if [ "$IMAGE_COUNT" -eq 0 ]; then
            echo "# ⚠️ No Images to Process" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The configuration file \`$CONFIG_FILE\` does not contain any valid images to process." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Please verify:**" >> $GITHUB_STEP_SUMMARY
            echo "- File exists and is readable" >> $GITHUB_STEP_SUMMARY
            echo "- Each object has at least the field \`source_image\` with a non-empty value" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Example of a valid configuration file:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            echo "[" >> $GITHUB_STEP_SUMMARY
            echo "  {" >> $GITHUB_STEP_SUMMARY
            echo "    \"source_image\": \"nginx:alpine\"," >> $GITHUB_STEP_SUMMARY
            echo "    \"repository_name\": \"nginx\"," >> $GITHUB_STEP_SUMMARY
            echo "    \"tag\": \"v1\"" >> $GITHUB_STEP_SUMMARY
            echo "  }" >> $GITHUB_STEP_SUMMARY
            echo "]" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "# ✅ Linux Images Pushed Successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📦 Images Processed:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -c '.[]' "$CONFIG_FILE" | while read -r line; do
              SOURCE=$(echo "$line" | jq -r '.source_image')
              REPO=$(echo "$line" | jq -r '.repository_name')
              TAG=$(echo "$line" | jq -r '.tag // "latest"')
              echo "- \`$SOURCE\` → \`ghcr.io/${{ github.repository_owner }}/$REPO:$TAG\`" >> $GITHUB_STEP_SUMMARY
            done
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🛡️ Security Scan Report (Trivy):" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            
            if [ -f "$TRIVY_REPORT" ]; then
              cat "$TRIVY_REPORT" >> $GITHUB_STEP_SUMMARY
            else
              echo "No vulnerabilities found or scan not executed" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** Linux | **Runner:** ubuntu-latest" >> $GITHUB_STEP_SUMMARY
