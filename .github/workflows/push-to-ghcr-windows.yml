name: Push Docker Images (Windows) to GHCR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/push-to-ghcr-windows.yml'
      - 'images-config.windows.json'
  
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Configuration file path (default: images-config.windows.json)'
        required: false
        type: string
        default: 'images-config.windows.json'

env:
  REGISTRY: ghcr.io

jobs:
  push-to-ghcr:
    runs-on: windows-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load and validate config
        shell: pwsh
        id: config
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'images-config.windows.json' }}"
          
          if (-not (Test-Path $CONFIG_FILE)) {
            Write-Error "Config file not found: $CONFIG_FILE"
            exit 1
          }
          
          try {
            $images = Get-Content $CONFIG_FILE | ConvertFrom-Json
          } catch {
            Write-Error "Failed to parse JSON file: $_"
            exit 1
          }
          
          # Contar imágenes válidas (con source_image definido y no vacío)
          $validImages = @()
          foreach ($image in $images) {
            if ($image.source_image -and $image.source_image.Trim().Length -gt 0) {
              $validImages += $image
            }
          }
          
          $imageCount = $validImages.Count
          Write-Output "image_count=$imageCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          
          if ($imageCount -gt 0) {
            Write-Output "has_images=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Output "has_images=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Log in to Container Registry
        if: steps.config.outputs.has_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Process images
        if: steps.config.outputs.has_images == 'true'
        shell: pwsh
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'images-config.windows.json' }}"
          $successLog = @()
          $errorLog = @()
          
          $images = Get-Content $CONFIG_FILE | ConvertFrom-Json
          
          foreach ($image in $images) {
            # Validate that source_image is defined and not empty
            if (-not $image.source_image -or $image.source_image.Trim().Length -eq 0) {
              continue
            }

            $sourceImage = $image.source_image
            $repositoryName = $image.repository_name
            $tag = $image.tag ?? "latest"
            $targetImage = "${{ env.REGISTRY }}/${{ github.repository_owner }}/$repositoryName"
            
            Write-Host ""
            Write-Host "════════════════════════════════════════" -ForegroundColor Cyan
            Write-Host "📦 Processing: $sourceImage" -ForegroundColor Yellow
            Write-Host "════════════════════════════════════════" -ForegroundColor Cyan
            
            Write-Host "📥 Pulling source image..."
            $pullOutput = docker pull "$sourceImage" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to pull: $sourceImage - $pullOutput"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              continue
            }
            
            Write-Host "🏷️  Tagging image..."
            $tagOutput = docker tag "$sourceImage" "${targetImage}:${tag}" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to tag: $sourceImage → ${targetImage}:${tag}"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              docker rmi "$sourceImage" 2>$null
              continue
            }
            
            $tagLatestOutput = docker tag "$sourceImage" "${targetImage}:latest" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to tag latest: $sourceImage → ${targetImage}:latest"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              docker rmi "$sourceImage" "${targetImage}:${tag}" 2>$null
              continue
            }
            
            Write-Host "🚀 Pushing to GHCR..."
            $pushOutput = docker push "${targetImage}:${tag}" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to push: ${targetImage}:${tag}"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              docker rmi "$sourceImage" "${targetImage}:${tag}" "${targetImage}:latest" 2>$null
              continue
            }
            
            $pushLatestOutput = docker push "${targetImage}:latest" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to push latest: ${targetImage}:latest"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              docker rmi "$sourceImage" "${targetImage}:${tag}" "${targetImage}:latest" 2>$null
              continue
            }
            
            Write-Host "🧹 Cleaning up..."
            docker rmi "$sourceImage" "${targetImage}:${tag}" "${targetImage}:latest" 2>$null
            
            Write-Host "✅ Done: $sourceImage → ${targetImage}:${tag}" -ForegroundColor Green
            $successLog += "$sourceImage|${targetImage}:${tag}"
          }
          
          # Save logs to files
          if ($successLog.Count -gt 0) {
            $successLog | Out-File -FilePath "$env:TEMP\success-summary.txt" -Encoding utf8
          } else {
            "" | Out-File -FilePath "$env:TEMP\success-summary.txt" -Encoding utf8
          }
          
          if ($errorLog.Count -gt 0) {
            $errorLog | Out-File -FilePath "$env:TEMP\error-summary.txt" -Encoding utf8
          } else {
            "" | Out-File -FilePath "$env:TEMP\error-summary.txt" -Encoding utf8
          }

      - name: Create job summary
        if: always()
        shell: pwsh
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'images-config.windows.json' }}"
          $imageCount = ${{ steps.config.outputs.image_count }}
          
          if ($imageCount -eq 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ⚠️ No Images to Process"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "El archivo de configuración \`$CONFIG_FILE\` no contiene imágenes válidas para procesar."
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Por favor verifica:**"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Que el archivo contenga un array válido"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Que cada objeto tenga al menos el campo \`source_image\` con un valor no vacío"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Ejemplo de configuración válida:**"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "``````json"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "["
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  {"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""source_image"": ""nginx:alpine"","
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""repository_name"": ""nginx"","
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""tag"": ""v1"""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  }"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "]"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "``````"
          } else {
            $successLog = @()
            $errorLog = @()
            
            if (Test-Path "$env:TEMP\success-summary.txt" -PathType Leaf) {
              $content = Get-Content "$env:TEMP\success-summary.txt" -ErrorAction SilentlyContinue
              if ($null -ne $content) {
                $successLog = @($content) | Where-Object { $null -ne $_ -and $_.Trim().Length -gt 0 }
              }
            }
            
            if (Test-Path "$env:TEMP\error-summary.txt" -PathType Leaf) {
              $content = Get-Content "$env:TEMP\error-summary.txt" -ErrorAction SilentlyContinue
              if ($null -ne $content) {
                $errorLog = @($content) | Where-Object { $null -ne $_ -and $_.Trim().Length -gt 0 }
              }
            }
            
            $successCount = $successLog.Count
            $errorCount = $errorLog.Count
            
            if ($successCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ✅ Windows Images Processed Successfully"
            } else {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ❌ Windows Images Processing Failed"
            }
            
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            
            if ($successCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## 📦 Images Pushed Successfully ($successCount/$imageCount):"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              
              foreach ($line in $successLog) {
                $parts = $line.Split('|')
                if ($parts.Count -eq 2) {
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ✅ ``$($parts[0])`` → ``$($parts[1])``"
                }
              }
              
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            }
            
            if ($errorCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## ❌ Images Failed to Process ($errorCount/$imageCount):"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              
              foreach ($line in $errorLog) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $line"
              }
              
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            }
            
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## 🔒 Security Notes:"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ⚠️ Trivy scanning is not supported on Windows runners"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ✅ Vulnerability scanning is enabled for Linux images"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verify Windows images manually or use Docker Desktop locally"
          }
          
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Platform:** Windows | **Runner:** windows-latest"
