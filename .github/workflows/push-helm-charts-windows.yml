name: Push Helm Charts (Windows) to GHCR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/push-helm-charts-windows.yml'
      - 'helm-charts-config.windows.json'
      - 'charts/**'
  
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Configuration file path (default: helm-charts-config.windows.json)'
        required: false
        type: string
        default: 'helm-charts-config.windows.json'

env:
  REGISTRY: ghcr.io

jobs:
  push-helm-charts:
    runs-on: windows-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Load and validate config
        shell: pwsh
        id: config
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'helm-charts-config.windows.json' }}"
          
          if (-not (Test-Path $CONFIG_FILE)) {
            Write-Error "Config file not found: $CONFIG_FILE"
            exit 1
          }
          
          try {
            $charts = Get-Content $CONFIG_FILE | ConvertFrom-Json
          } catch {
            Write-Error "Failed to parse JSON file: $_"
            exit 1
          }
          
          # Contar charts válidos
          $validCharts = @()
          foreach ($chart in $charts) {
            $isValid = $false
            
            if ($chart.type -and $chart.type.Trim().Length -gt 0 -and $chart.chart_name -and $chart.chart_name.Trim().Length -gt 0) {
              if ($chart.type -eq "local" -and $chart.chart_path -and $chart.chart_path.Trim().Length -gt 0) {
                $isValid = $true
              }
              elseif ($chart.type -eq "artifacthub" -and $chart.artifacthub_chart -and $chart.artifacthub_chart.Trim().Length -gt 0) {
                $isValid = $true
              }
            }
            
            if ($isValid) {
              $validCharts += $chart
            }
          }
          
          $chartCount = $validCharts.Count
          Write-Output "chart_count=$chartCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          
          if ($chartCount -gt 0) {
            Write-Output "has_charts=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Output "has_charts=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Log in to Container Registry
        if: steps.config.outputs.has_charts == 'true'
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}" | ConvertTo-SecureString -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential("${{ github.actor }}", $token)
          helm registry login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" "${{ env.REGISTRY }}"

      - name: Process helm charts
        if: steps.config.outputs.has_charts == 'true'
        shell: pwsh
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'helm-charts-config.windows.json' }}"
          $successLog = @()
          $errorLog = @()
          $packageDir = "$env:TEMP\helm-packages"
          
          if (-not (Test-Path $packageDir)) {
            New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          }
          
          $charts = Get-Content $CONFIG_FILE | ConvertFrom-Json
          
          foreach ($chart in $charts) {
            $chartType = $chart.type
            $chartName = $chart.chart_name
            $chartVersion = $chart.chart_version ?? "latest"
            $description = $chart.description ?? "Helm Chart"
            $targetChart = "${{ env.REGISTRY }}/${{ github.repository_owner }}/$chartName"
            
            Write-Host ""
            Write-Host "════════════════════════════════════════" -ForegroundColor Cyan
            Write-Host "📦 Processing: $chartName" -ForegroundColor Yellow
            Write-Host "════════════════════════════════════════" -ForegroundColor Cyan
            
            $chartFile = ""
            
            if ($chartType -eq "local") {
              # ============ PROCESAR CHART LOCAL ============
              $chartPath = $chart.chart_path
              
              Write-Host "📂 Type: Local Chart"
              
              if (-not (Test-Path $chartPath)) {
                $errorMsg = "❌ FAILED - Chart directory not found: $chartPath"
                Write-Host $errorMsg -ForegroundColor Red
                $errorLog += $errorMsg
                continue
              }
              
              Write-Host "📝 Validating Helm Chart..."
              $lintOutput = helm lint "$chartPath" 2>&1
              if ($LASTEXITCODE -ne 0) {
                $errorMsg = "❌ FAILED - Helm lint error: $chartPath"
                Write-Host $errorMsg -ForegroundColor Red
                $errorLog += $errorMsg
                continue
              }
              
              Write-Host "📦 Packaging Helm Chart..."
              $packageOutput = helm package "$chartPath" --version "$chartVersion" --destination "$packageDir" 2>&1
              if ($LASTEXITCODE -ne 0) {
                $errorMsg = "❌ FAILED to package: $chartName`:$chartVersion"
                Write-Host $errorMsg -ForegroundColor Red
                $errorLog += $errorMsg
                continue
              }
              
              $chartFile = "$packageDir\$chartName-$chartVersion.tgz"
              
            } elseif ($chartType -eq "artifacthub") {
              # ============ PROCESAR CHART DE ARTIFACT HUB ============
              $artifacthubChart = $chart.artifacthub_chart
              
              Write-Host "🌐 Type: Artifact Hub Chart"
              Write-Host "Pulling chart: $artifacthubChart`:$chartVersion"
              
              # Detectar el repositorio
              $repo = $artifacthubChart.Split('/')[0]
              
              # Agregar repositories públicas comunes
              switch ($repo) {
                "bitnami" {
                  helm repo add bitnami https://charts.bitnami.com/bitnami 2>$null
                }
                "stable" {
                  helm repo add stable https://charts.helm.sh/stable 2>$null
                }
                "incubator" {
                  helm repo add incubator https://charts.helm.sh/incubator 2>$null
                }
                default {
                  Write-Host "⚠️ Trying to pull as OCI chart from artifacthub..."
                }
              }
              
              helm repo update 2>$null
              
              Write-Host "📥 Pulling from Artifact Hub..."
              $pullOutput = helm pull "$artifacthubChart" --version "$chartVersion" --destination "$packageDir" 2>&1
              if ($LASTEXITCODE -ne 0) {
                $errorMsg = "❌ FAILED to pull: $artifacthubChart`:$chartVersion"
                Write-Host $errorMsg -ForegroundColor Red
                $errorLog += $errorMsg
                continue
              }
              
              # Buscar el archivo generado
              $chartFile = Get-ChildItem -Path $packageDir -Filter "*.tgz" -File | Select-Object -First 1 | ForEach-Object { $_.FullName }
              
              if (-not (Test-Path $chartFile)) {
                $errorMsg = "❌ FAILED - Chart package not found after pull"
                Write-Host $errorMsg -ForegroundColor Red
                $errorLog += $errorMsg
                continue
              }
            } else {
              $errorMsg = "❌ FAILED - Unknown chart type: $chartType"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              continue
            }
            
            # ============ VALIDAR ARCHIVO Y PUSHEAR (AMBOS TIPOS) ============
            if (-not (Test-Path $chartFile)) {
              $errorMsg = "❌ FAILED - Chart file not found: $chartFile"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              continue
            }
            
            Write-Host "🚀 Pushing to GHCR..."
            $pushOutput = helm push "$chartFile" "oci://${{ env.REGISTRY }}/${{ github.repository_owner }}" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $errorMsg = "❌ FAILED to push: ${targetChart}:${chartVersion}"
              Write-Host $errorMsg -ForegroundColor Red
              $errorLog += $errorMsg
              Remove-Item -Path $chartFile -Force 2>$null
              continue
            }
            
            Write-Host "🧹 Cleaning up..."
            Remove-Item -Path $chartFile -Force 2>$null
            
            Write-Host "✅ Done: $chartName`:$chartVersion → ${targetChart}:${chartVersion}" -ForegroundColor Green
            $successLog += "$chartName|${targetChart}:${chartVersion}|$description|$chartType"
          }
          
          # Save logs to files
          if ($successLog.Count -gt 0) {
            $successLog | Out-File -FilePath "$env:TEMP\success-charts-summary.txt" -Encoding utf8
          } else {
            "" | Out-File -FilePath "$env:TEMP\success-charts-summary.txt" -Encoding utf8
          }
          
          if ($errorLog.Count -gt 0) {
            $errorLog | Out-File -FilePath "$env:TEMP\error-charts-summary.txt" -Encoding utf8
          } else {
            "" | Out-File -FilePath "$env:TEMP\error-charts-summary.txt" -Encoding utf8
          }

      - name: Create job summary
        if: always()
        shell: pwsh
        run: |
          $CONFIG_FILE = "${{ github.event.inputs.config_file || 'helm-charts-config.windows.json' }}"
          $chartCount = ${{ steps.config.outputs.chart_count }}
          
          if ($chartCount -eq 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ⚠️ No Helm Charts to Process"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "El archivo de configuración \`$CONFIG_FILE\` no contiene charts válidos para procesar."
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Por favor verifica:**"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Que el archivo contenga un array válido"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Que cada objeto tenga al menos el campo \`chart_path\` con un valor no vacío"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Ejemplo de configuración válida:**"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "``````json"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "["
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  {"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""chart_path"": ""./charts/mychart"","
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""chart_name"": ""mychart"","
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""chart_version"": ""1.0.0"","
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "    ""description"": ""My Helm Chart"""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  }"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "]"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "``````"
          } else {
            $successLog = @()
            $errorLog = @()
            
            if (Test-Path "$env:TEMP\success-charts-summary.txt" -PathType Leaf) {
              $content = Get-Content "$env:TEMP\success-charts-summary.txt" -ErrorAction SilentlyContinue
              if ($null -ne $content) {
                $successLog = @($content) | Where-Object { $null -ne $_ -and $_.Trim().Length -gt 0 }
              }
            }
            
            if (Test-Path "$env:TEMP\error-charts-summary.txt" -PathType Leaf) {
              $content = Get-Content "$env:TEMP\error-charts-summary.txt" -ErrorAction SilentlyContinue
              if ($null -ne $content) {
                $errorLog = @($content) | Where-Object { $null -ne $_ -and $_.Trim().Length -gt 0 }
              }
            }
            
            $successCount = $successLog.Count
            $errorCount = $errorLog.Count
            
            if ($successCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ✅ Helm Charts Pushed Successfully"
            } else {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# ❌ Helm Charts Push Failed"
            }
            
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            
            if ($successCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## 📦 Helm Charts Pushed ($successCount/$chartCount):"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              
              foreach ($line in $successLog) {
                $parts = $line.Split('|')
                if ($parts.Count -ge 2) {
                  $chartType = if ($parts.Count -ge 4 -and $parts[3].Trim().Length -gt 0) { $parts[3] } else { "unknown" }
                  $typeEmoji = if ($chartType -eq "local") { "📂" } elseif ($chartType -eq "artifacthub") { "🌐" } else { "📦" }
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $typeEmoji \`\`$($parts[0])\`\` → \`\`$($parts[1])\`\`"
                  if ($parts.Count -ge 3 -and $parts[2].Trim().Length -gt 0) {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "  - $($parts[2])"
                  }
                }
              }
              
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            }
            
            if ($errorCount -gt 0) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## ❌ Helm Charts Failed ($errorCount/$chartCount):"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
              
              foreach ($line in $errorLog) {
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $line"
              }
              
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            }
          }
          
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "**Platform:** Windows | **Runner:** windows-latest"
